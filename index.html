<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dinuki Portfolio</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">
</head>
<body>

<!-- HERO -->
<section class="hero">
  <div class="hero-content">

    <div class="hero-text">
      <h1>DINUKI</h1>
      <p>Software Engineering Undergraduate</p>
      <button onclick="scrollToSection('projects')" class="btn">View My Work</button>
    </div>

    <div class="hero-image">
      <img src="your-photo.png" alt="Dinuki">
    </div>

  </div>
</section>

<!-- ABOUT -->
<section id="about" class="section">
  <h2>About Me</h2>
  <p>I am passionate about building modern applications and exploring DevOps and full-stack development.</p>
</section>

<!-- SKILLS -->
<section class="section">
  <h2>Skills</h2>
  <div class="skill-list">
    <span>Java</span>
    <span>Flutter</span>
    <span>JavaScript</span>
    <span>SQL</span>
  </div>
</section>

<!-- PROJECTS -->
<section id="projects" class="section">
  <h2>Projects</h2>
  <div class="project-grid">
    <div class="card">Project 1</div>
    <div class="card">Project 2</div>
    <div class="card">Project 3</div>
  </div>
</section>

<!-- CONTACT -->
<section class="section">
  <h2>Contact</h2>
  <p>Email: your@email.com</p>
</section>

<script src="script.js"></script>
</body>
</html>
